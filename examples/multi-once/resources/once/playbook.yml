# managed by green (once example) — RENDERED ONLY, never executed.
# ansible-remote scaffolds this playbook describing how the box would be
# configured: install Docker, install Basecamp ONCE, run every website with
# its SMTP env, and authorize the deploy key for the CI rollout user.
- name: Configure the ONCE VPS
  hosts: {{host.name}}
  become: true
  vars:
    deploy_user: {{host.user}}
    deploy_uid: {{host.uid}}
    smtp_server: {{smtp.smtp_server}}
    smtp_port: {{smtp.smtp_port}}
    smtp_username: {{smtp.smtp_username}}
    smtp_password: {{smtp.smtp_password}}
  tasks:
    - name: Install Docker
      ansible.builtin.package:
        name: docker.io
        state: present

    - name: Install Basecamp ONCE
      ansible.builtin.shell: curl https://get.once.com | sh
      args:
        creates: /opt/once

    - name: Authorize the deploy key for {{host.user}} (GitHub Action rollout)
      ansible.posix.authorized_key:
        user: "{{host.user}}"
        key: "{{deploy_key}}"
{% for w in websites %}
    - name: Run {{w.name}}
      community.docker.docker_container:
        name: {{w.name}}
        image: {{w.image}}
        restart_policy: unless-stopped
        env:
          VIRTUAL_HOST: "{{w.hostname}}"
          SMTP_SERVER: "{{smtp.smtp_server}}"
          SMTP_PORT: "{{smtp.smtp_port}}"
          SMTP_USERNAME: "{{smtp.smtp_username}}"
          SMTP_PASSWORD: "{{smtp.smtp_password}}"
{% endfor %}