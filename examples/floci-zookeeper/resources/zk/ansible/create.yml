---
# Provision a real ZooKeeper ensemble over SSH. The instance containers are
# minimal Ubuntu images without Python, so the first play bootstraps it with
# the raw module before any regular module runs.

- name: Bootstrap Python
  hosts: zookeeper
  gather_facts: false
  tasks:
    - name: Install python3 if missing
      raw: >
        test -e /usr/bin/python3 ||
        (apt-get update -qq &&
         DEBIAN_FRONTEND=noninteractive apt-get install -y -qq python3)
      changed_when: false

- name: Install and start ZooKeeper
  hosts: zookeeper
  vars:
    zk_version: "3.9.4"
    zk_url: "https://archive.apache.org/dist/zookeeper/zookeeper-{{ zk_version }}/apache-zookeeper-{{ zk_version }}-bin.tar.gz"
    zk_home: /opt/zookeeper
    zk_data: /var/lib/zookeeper
  tasks:
    - name: Install a JRE and archive tools
      apt:
        name:
          - openjdk-17-jre-headless
          - tar
          - gzip
        state: present
        update_cache: true

    - name: Download ZooKeeper {{ zk_version }}
      get_url:
        url: "{{ zk_url }}"
        dest: "/opt/apache-zookeeper-{{ zk_version }}-bin.tar.gz"
        mode: "0644"

    - name: Unpack ZooKeeper
      unarchive:
        src: "/opt/apache-zookeeper-{{ zk_version }}-bin.tar.gz"
        dest: /opt
        remote_src: true
        creates: "/opt/apache-zookeeper-{{ zk_version }}-bin"

    - name: Link {{ zk_home }} to the versioned directory
      file:
        src: "/opt/apache-zookeeper-{{ zk_version }}-bin"
        dest: "{{ zk_home }}"
        state: link

    - name: Data directory
      file:
        path: "{{ zk_data }}"
        state: directory
        mode: "0755"

    - name: Server id
      copy:
        content: "{{ zk_id }}\n"
        dest: "{{ zk_data }}/myid"
        mode: "0644"
      notify: restart zookeeper

    - name: Ensemble config
      template:
        src: templates/zoo.cfg.j2
        dest: "{{ zk_home }}/conf/zoo.cfg"
        mode: "0644"
      notify: restart zookeeper

    # Apply a config-triggered restart before checking liveness, so the
    # start task below only has to cover the fresh and crashed cases.
    - name: Flush handlers
      meta: flush_handlers

    # Right after a restart, `status` can race the server coming up and the
    # `start` fallback then finds it already running — that is success, not
    # failure; the workflow's health step verifies the ensemble for real.
    - name: Start ZooKeeper if not running
      shell: "{{ zk_home }}/bin/zkServer.sh status || {{ zk_home }}/bin/zkServer.sh start"
      register: zk_start
      changed_when: "'STARTED' in zk_start.stdout"
      failed_when: zk_start.rc != 0 and 'already running' not in zk_start.stdout

  handlers:
    - name: restart zookeeper
      shell: "{{ zk_home }}/bin/zkServer.sh restart"
