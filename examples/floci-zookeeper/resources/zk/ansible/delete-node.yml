---
# Per-node teardown: stop ZooKeeper and remove its files on a single host.
# Used by the workflow's per-node teardown fan-out with a single-host inventory.
# Only raw tasks: delete must work even if create never bootstrapped Python.

- name: Stop and remove ZooKeeper
  hosts: all
  gather_facts: false
  tasks:
    - name: Stop ZooKeeper (best effort)
      raw: /opt/zookeeper/bin/zkServer.sh stop || true
      changed_when: false

    - name: Remove installation and data
      raw: rm -rf /opt/zookeeper /opt/apache-zookeeper-* /var/lib/zookeeper
      changed_when: false
